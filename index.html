<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHUYNHSGAMING.COM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Header -->
    <header class="bg-white p-4 custom-shadow flex flex-wrap justify-between items-center gap-4">
        <div class="font-bold text-xl text-blue-600">BHUYNHSGAMING.COM</div>
        <div class="flex gap-2">
            <input type="text" placeholder="Nhập tìm kiếm" class="border p-2 rounded-lg text-sm w-48">
            <button class="bg-gray-100 px-4 py-2 rounded-lg text-sm">Tìm kiếm</button>
        </div>
        <div class="flex gap-2">
            <button class="bg-red-100 text-red-600 px-4 py-2 rounded-lg text-sm font-semibold">Đăng nhập</button>
            <button class="bg-blue-100 text-blue-600 px-4 py-2 rounded-lg text-sm font-semibold">Lịch sử</button>
        </div>
    </header>

    <!-- Content -->
    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-4 gap-6 mt-6">
        
        <!-- Cột trái: Banner và Dịch vụ -->
        <div class="lg:col-span-3 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="h-64 rounded-xl overflow-hidden shadow-md">
                    <img src="https://quanlyshop.com/assets/uploads/banner/6a0971e2c730a-bf4431c0fcbd.png" alt="Banner chính" class="w-full h-full object-cover">
                </div>
                <div class="grid grid-rows-2 gap-4">
                    <div class="rounded-xl overflow-hidden shadow-md">
                        <img src="https://quanlyshop.com/assets/uploads/banner/6a0971e2c730a-bf4431c0fcbd.png" alt="Banner phụ 1" class="w-full h-full object-cover">
                    </div>
                    <div class="rounded-xl overflow-hidden shadow-md">
                        <img src="https://quanlyshop.com/assets/uploads/banner/6a0971e2c730a-bf4431c0fcbd.png" alt="Banner phụ 2" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>

            <!-- Danh mục game -->
            <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-4">
                <a href="#" class="bg-white p-3 rounded-xl border text-center hover:shadow-lg transition">
                    <img src="https://static.deltiasgaming.com/2025/04/Blox-Fruits.jpg" class="w-16 h-16 mx-auto rounded-lg mb-2 object-cover">
                    <p class="text-xs font-semibold">Blox Fruit</p>
                </a>
                <a href="#" class="bg-white p-3 rounded-xl border text-center hover:shadow-lg transition">
                    <img src="https://is1-ssl.mzstatic.com/image/thumb/Music116/v4/a0/cb/44/a0cb447b-2dfb-69c7-5059-c4216307956c/196835967394.jpg/1200x1200bf-60.jpg" class="w-16 h-16 mx-auto rounded-lg mb-2 object-cover">
                    <p class="text-xs font-semibold">Free Fire</p>
                </a>
                <a href="#" class="bg-white p-3 rounded-xl border text-center hover:shadow-lg transition">
                    <img src="https://tse4.mm.bing.net/th/id/OIP.J6y0A_CO3oTF2YGyH5t3qAHaEK?r=0&rs=1&pid=ImgDetMain&o=7&rm=3" class="w-16 h-16 mx-auto rounded-lg mb-2 object-cover">
                    <p class="text-xs font-semibold">Brainrot</p>
                </a>
            </div>
        </div>

        <!-- Cột phải: Box Nạp thẻ -->
        <div class="lg:col-span-1">
            <div class="bg-white p-5 rounded-xl border border-blue-200 custom-shadow">
                <h2 class="font-bold mb-4 flex items-center gap-2">🏆 TOP NẠP THÁNG 05</h2>
                <div class="flex bg-gray-100 rounded-lg p-1 mb-4">
                    <button class="bg-red-500 text-white flex-1 py-2 rounded-md text-sm">Nạp thẻ</button>
                    <button class="flex-1 py-2 text-sm">Tháng này</button>
                </div>
                <select class="w-full border p-2 rounded-lg mb-3 text-sm">
                    <option>Viettel</option>
                </select>
                <input type="text" placeholder="Nhập mã thẻ" class="w-full border p-2 rounded-lg mb-3 text-sm">
                <input type="text" placeholder="Nhập số serial" class="w-full border p-2 rounded-lg mb-4 text-sm">
                <button class="w-full bg-red-600 text-white py-3 rounded-lg font-bold">NẠP THẺ NGAY</button>
            </div>
        </div>

    </main>

</body>
</html>
